<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามการใช้ยา - โรงพยาบาลนพรัตนราชธานี</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">โรงพยาบาลนพรัตนราชธานี</h4>
            <small>ระบบบันทึกประวัติการใช้ยาและประเมินอาการแพ้ยา (ADR)</small>
        </div>
        <div class="card-body">
            
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <div>
                    <button id="btnOpenFile" class="btn btn-outline-secondary btn-sm">เปิดไฟล์เดิม (JSON)</button>
                    <input type="file" id="fileInput" accept=".json" style="display: none;">
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="toggleTimeline" checked>
                    <label class="form-check-label" for="toggleTimeline">แสดงข้อมูลเชิงลึกบน Timeline</label>
                </div>
            </div>

            <form id="adrForm">
                <h5 class="text-primary border-bottom pb-2">1. ข้อมูลทั่วไปของผู้ป่วย</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label>ชื่อ-นามสกุล ผู้ป่วย</label>
                        <input type="text" class="form-control" id="patientName" required>
                    </div>
                    <div class="col-md-3">
                        <label>Hospital Number (HN)</label>
                        <input type="text" class="form-control" id="hn" required>
                    </div>
                    <div class="col-md-3">
                        <label>Admission Number (AN)</label>
                        <input type="text" class="form-control" id="an">
                    </div>
                    <div class="col-md-6">
                        <label>วันที่จัดทำประวัติ</label>
                        <input type="date" class="form-control" id="recordDate" required>
                    </div>
                    <div class="col-md-6">
                        <label>เภสัชกรผู้ประเมิน / ผู้จัดทำ</label>
                        <input type="text" class="form-control" id="pharmacist" required>
                    </div>
                </div>

                <h5 class="text-primary border-bottom pb-2">2. บันทึกประวัติการใช้ยา</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-8">
                        <label>ชื่อยา</label>
                        <input type="text" class="form-control" id="drugName" required>
                    </div>
                    <div class="col-md-4">
                        <label>ขนาดการใช้ (Dose)</label>
                        <input type="text" class="form-control" id="dose">
                    </div>
                    <div class="col-md-6">
                        <label>วันที่เริ่มใช้ยา (Start)</label>
                        <input type="date" class="form-control" id="startDate">
                        <div class="form-check mt-1">
                            <input class="form-check-input" type="checkbox" id="unknownStart">
                            <label class="form-check-label text-muted small">ไม่ระบุวันเริ่ม / ไม่ทราบ</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label>วันที่หยุดยา (Off)</label>
                        <input type="date" class="form-control" id="endDate">
                        <div class="form-check mt-1">
                            <input class="form-check-input" type="checkbox" id="currentlyUsing">
                            <label class="form-check-label text-muted small">ปัจจุบันยังใช้อยู่</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label>เวลา First dose</label>
                        <input type="time" class="form-control" id="firstDoseTime">
                    </div>
                    <div class="col-md-6">
                        <label>เวลา Last dose</label>
                        <input type="time" class="form-control" id="lastDoseTime">
                    </div>
                </div>

                <h5 class="text-danger border-bottom pb-2">3. บันทึกเหตุการณ์ / อาการแพ้ (ADR)</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-8">
                        <label>ลักษณะอาการไม่พึงประสงค์ที่ตรวจพบ</label>
                        <input type="text" class="form-control" id="adrSymptom" required>
                    </div>
                    <div class="col-md-4">
                        <label>วันที่เริ่มปรากฏอาการ</label>
                        <input type="date" class="form-control" id="adrDate" required>
                    </div>
                </div>

                <h5 class="text-success border-bottom pb-2">4. Pharmacist Note</h5>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <textarea class="form-control" id="pharmacistNote" rows="3"></textarea>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="button" class="btn btn-info text-white" id="btnPlot">พรีวิว Timeline</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">บันทึกข้อมูลเข้าสู่ระบบ</button>
                </div>
            </form>

            <div id="timelineContainer" class="mt-5">
                <h5 class="text-center">Medication & ADR Timeline</h5>
                <div id="chart_div"></div>
            </div>

        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
